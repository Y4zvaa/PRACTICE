<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/reg.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="Логотип">
                </a>
            </div>
            <nav class="main-navigation">
                <a href="index.html">О компании</a>
                <a href="catalog.html" class="active">Каталог</a>
                <a href="#">Партнёрам</a>
                <a href="#">Вакансии</a>
                <a href="admin.html">Связаться</a>
                <a href="profile.html">Профиль</a>
            </nav>
            <div class="header-phone">
            </div>
        </div>
    </header>
    <main class="register-main">
        <div class="reg-container">
            <h1 class="reg-title">Вход в аккаунт</h1>
            <p class="reg-subtitle">Заполните форму для входа в аккаунт</p>

            <form class="reg-form">
                <div class="form-group">
                    <label for="auth-email">E-mail *</label>
                    <input type="email" id="auth-email" placeholder="Введите действующий e-mail" required>
                </div>

                <div class="form-group">
                    <label for="auth-password">Пароль *</label>
                    <input type="password" id="auth-password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="reg-submit-button">Войти</button>
            </form>

            <p class="reg-login-link">Нет аккаунта? <a href="reg.html">Зарегистрироваться</a></p>
            <div class="reg-login-link">
                Забыли пароль? <a href="#">Восстановить</a>
            </div>
        </div>
    </main>
    <script src="scripts/script.js"></script>
</body>

</html>
